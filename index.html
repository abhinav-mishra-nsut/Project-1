<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi I am Abhinav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep: #0a0a12;
      --accent-1: #6366f1;
      --accent-2: #a855f7;
      --accent-3: #ec4899;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Animated gradient orbs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 12s ease-in-out infinite;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--accent-1);
      top: -10%;
      left: -5%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: var(--accent-2);
      bottom: -10%;
      right: -5%;
      animation-delay: -4s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: var(--accent-3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -8s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .orb-3 {
      animation-name: float-center;
    }

    @keyframes float-center {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      33% { transform: translate(calc(-50% + 30px), calc(-50% - 30px)) scale(1.05); }
      66% { transform: translate(calc(-50% - 20px), calc(-50% + 20px)) scale(0.95); }
    }

    /* Grid overlay */
    .grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
    }

    /* Main card */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 3rem 4rem;
      animation: fadeUp 1s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      margin-bottom: 2rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent-1) 40%, var(--accent-2) 70%, var(--accent-3) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      font-size: 1.25rem;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 420px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 2rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.35);
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s;
    }

    .cta:hover svg {
      transform: translateX(4px);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% {
        opacity: 0;
        transform: translateY(100vh) scale(0);
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translateY(-10vh) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid"></div>
  <div class="particles" id="particles"></div>

  <main class="container">
    <div class="badge">
      <span class="badge-dot"></span>
      Welcome
    </div>
    <h1>Hi I am Abhinav</h1>
    <p class="subtitle">
      Your first page is live. Open this file in any browser and start building something amazing.
    </p>
    <nav style="display:flex; justify-content:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap;">
      <a href="about.html" style="color:#cbd5e1; text-decoration:none; font-weight:500;">About</a>
      <a href="contact.html" style="color:#cbd5e1; text-decoration:none; font-weight:500;">Contact</a>
    </nav>
    <button class="cta" onclick="celebrate()">
      Get Started
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
      </svg>
    </button>
  </main>

  <script>
    // Spawn floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      container.appendChild(p);
    }

    function celebrate() {
      const btn = document.querySelector('.cta');
      btn.textContent = '🎉 Let\'s go!';
      btn.style.background = 'linear-gradient(135deg, #22c55e, #6366f1)';
    }
  </script>
</body>
</html>
